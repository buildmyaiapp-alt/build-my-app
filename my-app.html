<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spice Kitchen</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #FF6B35;
            --primary-dark: #E55A2B;
            --secondary: #F7931E;
            --accent: #FFD23F;
            --dark: #1A1A2E;
            --gray: #6B7280;
            --light-gray: #F3F4F6;
            --white: #FFFFFF;
            --success: #10B981;
            --warning: #FBBF24;
            --danger: #EF4444;
            --gradient: linear-gradient(135deg, #FF6B35 0%, #F7931E 100%);
            --gradient-dark: linear-gradient(135deg, #1A1A2E 0%, #16213E 100%);
        }

        body {
            background: var(--light-gray);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            background: var(--white);
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .page {
            display: none;
            padding-bottom: 80px;
            min-height: 100vh;
            animation: fadeIn 0.3s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 20px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
            z-index: 1000;
            border-radius: 20px 20px 0 0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 12px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-item i {
            font-size: 22px;
            color: var(--gray);
            transition: all 0.3s ease;
        }

        .nav-item span {
            font-size: 10px;
            color: var(--gray);
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-item.active i,
        .nav-item.active span {
            color: var(--primary);
        }

        .nav-item.active {
            background: rgba(255, 107, 53, 0.1);
        }

        .nav-item .badge {
            position: absolute;
            top: 2px;
            right: 8px;
            background: var(--danger);
            color: white;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }

        /* Hero Section */
        .hero {
            background: var(--gradient);
            padding: 40px 20px 60px;
            border-radius: 0 0 40px 40px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
        }

        .hero-content {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .hero-logo {
            width: 80px;
            height: 80px;
            background: var(--white);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .hero-logo i {
            font-size: 40px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero h1 {
            color: var(--white);
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .hero p {
            color: rgba(255,255,255,0.9);
            font-size: 14px;
            font-weight: 400;
        }

        /* Section Styles */
        .section {
            padding: 20px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--dark);
        }

        .see-all {
            color: var(--primary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Dish Cards */
        .dish-scroll {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: none;
        }

        .dish-scroll::-webkit-scrollbar {
            display: none;
        }

        .dish-card {
            min-width: 160px;
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .dish-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .dish-image {
            height: 120px;
            background: linear-gradient(135deg, #FFE4D6 0%, #FFC7AA 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .dish-image i {
            font-size: 50px;
            color: var(--primary);
            opacity: 0.5;
        }

        .dish-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: var(--success);
            color: white;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 600;
        }

        .dish-info {
            padding: 12px;
        }

        .dish-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 4px;
        }

        .dish-price {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
        }

        /* Reviews */
        .review-card {
            background: var(--white);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
        }

        .review-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .review-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
        }

        .review-user h4 {
            font-size: 14px;
            font-weight: 600;
            color: var(--dark);
        }

        .review-stars {
            color: var(--warning);
            font-size: 12px;
        }

        .review-text {
            font-size: 13px;
            color: var(--gray);
            line-height: 1.5;
        }

        /* Primary Button */
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(255, 107, 53, 0.4);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        /* Menu Page */
        .page-header {
            padding: 20px;
            background: var(--white);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .page-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--dark);
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: var(--light-gray);
            border-radius: 12px;
            padding: 12px 16px;
            margin-top: 16px;
            gap: 12px;
        }

        .search-bar i {
            color: var(--gray);
        }

        .search-bar input {
            flex: 1;
            border: none;
            background: none;
            font-size: 14px;
            outline: none;
        }

        .category-filter {
            display: flex;
            gap: 10px;
            padding: 16px 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .category-filter::-webkit-scrollbar {
            display: none;
        }

        .category-chip {
            padding: 10px 20px;
            background: var(--light-gray);
            border-radius: 25px;
            font-size: 13px;
            font-weight: 500;
            color: var(--gray);
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-chip.active {
            background: var(--gradient);
            color: white;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding: 0 20px 20px;
        }

        .menu-card {
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }

        .menu-card:active {
            transform: scale(0.97);
        }

        .menu-image {
            height: 100px;
            background: linear-gradient(135deg, #FFE4D6 0%, #FFC7AA 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .menu-image i {
            font-size: 40px;
            color: var(--primary);
            opacity: 0.5;
        }

        .veg-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 16px;
            height: 16px;
            border: 2px solid var(--success);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .veg-badge::after {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
        }

        .non-veg-badge {
            border-color: var(--danger);
        }

        .non-veg-badge::after {
            background: var(--danger);
        }

        .menu-info {
            padding: 12px;
        }

        .menu-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .menu-desc {
            font-size: 11px;
            color: var(--gray);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .menu-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-price {
            font-size: 15px;
            font-weight: 700;
            color: var(--primary);
        }

        .add-btn {
            width: 32px;
            height: 32px;
            background: var(--gradient);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .add-btn:active {
            transform: scale(0.9);
        }

        /* Cart Page */
        .cart-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }

        .cart-empty i {
            font-size: 80px;
            color: var(--light-gray);
            margin-bottom: 20px;
        }

        .cart-empty h3 {
            font-size: 20px;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .cart-empty p {
            color: var(--gray);
            font-size: 14px;
        }

        .cart-item {
            display: flex;
            gap: 16px;
            padding: 16px 20px;
            background: var(--white);
            border-bottom: 1px solid var(--light-gray);
            animation: slideUp 0.3s ease;
        }

        .cart-item-image {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #FFE4D6 0%, #FFC7AA 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .cart-item-image i {
            font-size: 30px;
            color: var(--primary);
            opacity: 0.5;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 4px;
        }

        .cart-item-price {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .qty-btn {
            width: 32px;
            height: 32px;
            border: 2px solid var(--primary);
            background: var(--white);
            border-radius: 8px;
            color: var(--primary);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qty-btn:active {
            background: var(--primary);
            color: white;
        }

        .qty-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--dark);
            min-width: 24px;
            text-align: center;
        }

        .remove-btn {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
        }

        .cart-summary {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: var(--white);
            padding: 20px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
            color: var(--gray);
        }

        .summary-row.total {
            font-size: 18px;
            font-weight: 700;
            color: var(--dark);
            padding-top: 12px;
            border-top: 2px dashed var(--light-gray);
            margin-top: 12px;
        }

        /* Orders Page */
        .order-card {
            background: var(--white);
            border-radius: 16px;
            padding: 16px;
            margin: 0 20px 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .order-id {
            font-size: 14px;
            font-weight: 600;
            color: var(--dark);
        }

        .order-date {
            font-size: 12px;
            color: var(--gray);
            margin-top: 2px;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-delivered {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .status-preparing {
            background: rgba(251, 191, 36, 0.1);
            color: var(--warning);
        }

        .status-cancelled {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .order-items {
            padding: 12px 0;
            border-top: 1px solid var(--light-gray);
            border-bottom: 1px solid var(--light-gray);
        }

        .order-item-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--gray);
            margin-bottom: 6px;
        }

        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }

        .order-total {
            font-size: 16px;
            font-weight: 700;
            color: var(--dark);
        }

        .reorder-btn {
            padding: 10px 20px;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .reorder-btn:active {
            transform: scale(0.95);
        }

        /* Profile Page */
        .profile-header {
            background: var(--gradient);
            padding: 40px 20px;
            text-align: center;
            border-radius: 0 0 40px 40px;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: var(--white);
            border-radius: 50%;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .profile-avatar i {
            font-size: 50px;
            color: var(--primary);
        }

        .profile-name {
            font-size: 24px;
            font-weight: 700;
            color: white;
            margin-bottom: 4px;
        }

        .profile-email {
            font-size: 14px;
            color: rgba(255,255,255,0.8);
        }

        .profile-section {
            padding: 20px;
        }

        .profile-card {
            background: var(--white);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
        }

        .profile-card-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        .profile-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 0;
            border-bottom: 1px solid var(--light-gray);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .profile-item:last-child {
            border-bottom: none;
        }

        .profile-item:active {
            opacity: 0.7;
        }

        .profile-item-icon {
            width: 44px;
            height: 44px;
            background: var(--light-gray);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-item-icon i {
            font-size: 18px;
            color: var(--primary);
        }

        .profile-item-info {
            flex: 1;
        }

        .profile-item-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--dark);
        }

        .profile-item-value {
            font-size: 12px;
            color: var(--gray);
        }

        .profile-item i.fa-chevron-right {
            color: var(--gray);
            font-size: 14px;
        }

        .logout-btn {
            width: 100%;
            padding: 16px;
            background: var(--white);
            color: var(--danger);
            border: 2px solid var(--danger);
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: var(--danger);
            color: white;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--dark);
            color: white;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast i {
            color: var(--success);
        }

        /* Success Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--white);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            max-width: 320px;
            transform: scale(0.8);
            transition: all 0.3s ease;
        }

        .modal-overlay.show .modal-content {
            transform: scale(1);
        }

        .modal-icon {
            width: 80px;
            height: 80px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .modal-icon i {
            font-size: 40px;
            color: var(--success);
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .modal-text {
            font-size: 14px;
            color: var(--gray);
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Home Page -->
        <div id="home" class="page active">
            <div class="hero">
                <div class="hero-content">
                    <div class="hero-logo">
                        <i class="fas fa-utensils"></i>
                    </div>
                    <h1>Spice Kitchen</h1>
                    <p>Fresh Indian Food Delivered Fast</p>
                </div>
            </div>

            <div class="section">
                <div class="section-header">
                    <h2 class="section-title">Featured Dishes</h2>
                    <span class="see-all" onclick="showPage('menu')">See All</span>
                </div>
                <div class="dish-scroll">
